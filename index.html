<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poboshini Omashi — Software Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0e;
    --surface: #0c1419;
    --surface2: #111d24;
    --accent: #00e5c3;
    --accent2: #ff6b47;
    --accent3: #7c4dff;
    --text: #e8f4f0;
    --text-muted: #6b8c85;
    --text-dim: #2e4d47;
    --border: rgba(0,229,195,0.12);
    --glow: rgba(0,229,195,0.15);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
  html { scroll-behavior: smooth; }
 
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease, opacity 0.15s ease;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid rgba(0,229,195,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: all 0.25s ease;
  }

  .cursor.hover { transform: scale(2.5); }
  .cursor-ring.hover { transform: scale(0.5); opacity: 0; }
 
  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Nav */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 48px;
    background: linear-gradient(to bottom, rgba(5,10,14,0.95), transparent);
    backdrop-filter: blur(0px);
  }
 
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }
 
  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 100%;
    height: 1px;
    background: var(--accent);
    transition: right 0.3s ease;
  }

  .nav-links a:hover { color: var(--accent); }
  .nav-links a:hover::after { right: 0; }
