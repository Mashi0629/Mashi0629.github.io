<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poboshini Omashi — Software Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0e;
    --surface: #0c1419;
    --surface2: #111d24;
    --accent: #00e5c3;
    --accent2: #ff6b47;
    --accent3: #7c4dff;
    --text: #e8f4f0;
    --text-muted: #6b8c85;
    --text-dim: #2e4d47;
    --border: rgba(0,229,195,0.12);
    --glow: rgba(0,229,195,0.15);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
  html { scroll-behavior: smooth; }
 
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }
